<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrada de Contrato - POP FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    :root {
      --primary: #8b5cf6; /* Purple for contracts area */
      --primary-dark: #7c3aed;
      --bg: #fdfeff;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }

    /* Animated background gradient */
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%);
      z-index: -1;
    }

    /* Login Overlay */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-card {
      background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo {
      margin-bottom: 24px; display: inline-flex; padding: 12px; background: #f5f3ff;
      border-radius: 12px; color: var(--primary);
    }

    input, select, textarea {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 16px; font-size: 1rem; outline: none; transition: all 0.2s;
      background: #f8fafc;
    }
    input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
    
    label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

    button {
      width: 100%; padding: 14px; background: var(--primary); color: white; border: none;
      border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    /* Main Form */
    .app-container { display: none; padding: 60px 20px; max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    .header p { color: var(--text-light); }

    .contract-card {
      background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
    }
    
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: #f1f5f9; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      color: var(--text-light); margin-bottom: 16px;
    }

    /* Success state */
    .success-panel {
      display: none; text-align: center; padding: 60px 20px;
    }
    .success-icon {
      font-size: 64px; color: #10b981; margin-bottom: 24px;
    }

    @media (max-width: 480px) {
      .contract-card { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- Login Area -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <ion-icon name="document-text" style="font-size: 32px;"></ion-icon>
      </div>
      <h1>Acesso Vendedor</h1>
      <p style="margin-bottom: 32px; font-size: 0.875rem; color: var(--text-light);">Identifique-se para inserir dados do contrato</p>
      
      <div style="text-align: left;">
        <label>Usuário</label>
        <input type="text" id="sellerUser" placeholder="Seu nome de usuário...">
        <label>Senha</label>
        <input type="password" id="sellerPass" placeholder="Sua senha...">
      </div>
      
      <button onclick="loginSeller()" id="loginBtn">Entrar no Sistema</button>
      <div id="loginError" style="color: var(--error); font-size: 0.8125rem; margin-top: 16px; display: none;">Credenciais inválidas.</div>
    </div>
  </div>

  <!-- Form Area -->
  <div id="app" class="app-container">
    <div class="header">
      <div class="status-badge">
        <ion-icon name="person-outline"></ion-icon>
        <span id="welcomeMsg">Vendedor Logado</span>
      </div>
      <h1>Novo Contrato</h1>
      <p>Preencha os dados básicos da empresa</p>
    </div>

    <div class="contract-card">
      <form id="contractForm" onsubmit="submitForm(event)">
        <div style="margin-bottom: 24px;">
          <label>CNPJ da Empresa</label>
          <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
        </div>

        <div style="margin-bottom: 32px;">
          <label>Nome Fantasia / Razão Social</label>
          <input type="text" id="companyName" placeholder="Nome da empresa..." required>
        </div>

        <button type="submit" id="submitBtn">
          <span>Enviar Dados</span>
          <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>
      </form>
    </div>

    <div style="margin-top: 32px; text-align: center;">
      <button onclick="logout()" style="background: none; color: var(--text-light); width: auto; font-size: 0.8125rem; font-weight: 500;">
        <ion-icon name="log-out-outline"></ion-icon> Sair da conta
      </button>
    </div>
  </div>

  <!-- Success Panel -->
  <div id="successPanel" class="success-panel">
    <div class="success-icon"><ion-icon name="checkmark-circle"></ion-icon></div>
    <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 12px;">Dados Enviados!</h1>
    <p style="color: var(--text-light); margin-bottom: 32px;">O contrato foi registrado e está pronto para processamento.</p>
    <button onclick="location.reload()" style="max-width: 250px; margin: 0 auto; background: #e2e8f0; color: #1e293b;">Novo Lançamento</button>
  </div>

  <script>
    async function loginSeller() {
      const username = document.getElementById('sellerUser').value;
      const password = document.getElementById('sellerPass').value;
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('loginError');

      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      error.style.display = 'none';

      try {
        const res = await fetch('/api/auth-seller', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('pop_seller_token', data.token);
          localStorage.setItem('pop_seller_name', data.user.name);
          showApp();
        } else {
          error.style.display = 'block';
        }
      } catch (e) {
        alert('Erro ao conectar.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar no Sistema';
      }
    }

    function showApp() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('welcomeMsg').textContent = `Vendedor: ${localStorage.getItem('pop_seller_name')}`;
    }

    function logout() {
      localStorage.removeItem('pop_seller_token');
      localStorage.removeItem('pop_seller_name');
      location.reload();
    }

    async function submitForm(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const cnpj = document.getElementById('cnpj').value;
      const companyName = document.getElementById('companyName').value;
      const token = localStorage.getItem('pop_seller_token');

      btn.disabled = true;
      btn.innerHTML = '<ion-icon name="sync-outline" class="spin"></ion-icon> Enviando...';

      try {
        const res = await fetch('/api/contract-submit', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ cnpj, companyName })
        });

        if (res.ok) {
          document.getElementById('app').style.display = 'none';
          document.getElementById('successPanel').style.display = 'block';
        } else {
          throw new Error('Falha no envio');
        }
      } catch (error) {
        alert('Erro ao enviar dados para o servidor.');
        btn.disabled = false;
        btn.innerHTML = '<span>Enviar Dados</span><ion-icon name="arrow-forward-outline"></ion-icon>';
      }
    }

    window.onload = () => {
      if (localStorage.getItem('pop_seller_token')) {
        showApp();
      }
    };
  </script>
</body>
</html>
