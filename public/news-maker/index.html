<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsMaker - Gerador de Boletins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --color-primary: #143327;
      --color-secondary: #1b5e45;
      --color-accent: #e7f6ec;
      --color-bg-start: #f3f7f3;
      --color-bg-end: #eaf0eb;
      --color-border: #cde0d5;
      --color-text: #1f3b31;
      --color-text-light: #3d5d51;
      --color-success: #059669;
      --color-error: #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
      color: var(--color-text);
      min-height: 100vh;
      padding: 20px;
    }

    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(26, 63, 50, 0.08);
      border: 1px solid var(--color-border);
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 20px;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #065f46;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .app-shell { display: none; max-width: 1880px; margin: 0 auto; }

    .toolbar {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--color-border);
      box-shadow: 0 14px 30px rgba(26, 63, 50, 0.08);
      border-radius: 16px;
      padding: 14px 20px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left { display: flex; align-items: center; gap: 16px; }
    .toolbar h1 { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--color-primary); }
    .toolbar-date input { padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 8px; }

    .toolbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: #065f46; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-sync { background: #2980b9; color: white; }
    .btn-secondary { background: #e2e8f0; color: #475569; }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sections { display: flex; flex-direction: column; gap: 16px; }
    .section-card {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 16px;
    }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-header h2 { font-size: 1.1rem; color: var(--color-primary); }
    .section-chip { font-size: 0.8rem; background: var(--color-accent); padding: 4px 10px; border-radius: 999px; }

    .news-grid { display: flex; flex-direction: column; gap: 12px; }
    .news-input textarea {
      width: 100%; min-height: 100px; padding: 12px;
      border: 1px solid var(--color-border); border-radius: 8px;
      font-family: inherit; resize: vertical;
    }

    .result-area { margin-top: 16px; background: white; border: 1px solid var(--color-border); border-radius: 16px; padding: 16px; }
    #resultBox { width: 100%; min-height: 150px; background: #f8fafc; font-family: monospace; padding: 12px; border-radius: 8px; border: 1px solid var(--color-border); }

    .toast {
      position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
      border-radius: 8px; color: white; transform: translateY(100px);
      opacity: 0; transition: all 0.3s ease; z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-error); }

    .generated-output { margin-top: 12px; background: #f0fdf4; padding: 12px; border-radius: 8px; display: none; }
    .generated-output ul { list-style: none; font-size: 13px; color: #15803d; }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>NewsMaker</h1>
      <input type="password" id="passwordInput" placeholder="Digite a senha" />
      <button onclick="checkPassword()">Entrar</button>
    </div>
  </div>

  <div id="appShell" class="app-shell">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>NewsMaker</h1>
        <div class="toolbar-date"><input type="date" id="dateInput"></div>
      </div>
      <div class="toolbar-actions">
        <span id="statusLabel" style="font-size: 14px; color: var(--color-text-light);">Aguardando...</span>
        <button id="generateBtn" class="btn btn-primary" onclick="generate()">Gerar Boletins</button>
        <button id="downloadBtn" class="btn btn-success" style="display: none;" onclick="downloadAllRTFs()">Baixar RTFs (.zip)</button>
        <button id="syncBtn" class="btn btn-sync" style="display: none;" onclick="dispatchToStudios()">Sincronizar KV</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpar</button>
      </div>
    </div>

    <div class="sections">
      <div class="section-card">
        <div class="section-header"><h2>Nacional</h2><span class="section-chip">3 notícias</span></div>
        <div class="news-grid"><textarea id="nacional-1" placeholder="Notícia 1"></textarea><textarea id="nacional-2" placeholder="Notícia 2"></textarea><textarea id="nacional-3" placeholder="Notícia 3"></textarea></div>
      </div>
      <div class="section-card">
        <div class="section-header"><h2>Itapeva</h2><span class="section-chip">3 notícias</span></div>
        <div class="news-grid"><textarea id="itapeva-1" placeholder="Notícia 1"></textarea><textarea id="itapeva-2" placeholder="Notícia 2"></textarea><textarea id="itapeva-3" placeholder="Notícia 3"></textarea></div>
      </div>
      <div class="section-card">
        <div class="section-header"><h2>Itapetininga</h2><span class="section-chip">3 notícias</span></div>
        <div class="news-grid"><textarea id="itapetininga-1" placeholder="Notícia 1"></textarea><textarea id="itapetininga-2" placeholder="Notícia 2"></textarea><textarea id="itapetininga-3" placeholder="Notícia 3"></textarea></div>
      </div>
    </div>

    <div class="result-area">
      <textarea id="resultBox" readonly></textarea>
      <div id="generatedOutput" class="generated-output"><h3>Arquivos Gerados:</h3><ul id="fileList"></ul></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = '/api/generate';
    const DISPATCH_URL = '/api/dispatch';
    const sections = ['nacional', 'itapeva', 'itapetininga'];

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    function saveState() {
      const state = { date: document.getElementById('dateInput').value, sections: {} };
      sections.forEach(s => {
        state.sections[s] = [1,2,3].map(i => document.getElementById(`${s}-${i}`).value);
      });
      localStorage.setItem('newsmaker_state', JSON.stringify(state));
    }

    function loadState() {
      const state = JSON.parse(localStorage.getItem('newsmaker_state') || '{}');
      if (state.date) document.getElementById('dateInput').value = state.date;
      if (state.sections) {
        sections.forEach(s => {
          if (state.sections[s]) state.sections[s].forEach((v, i) => document.getElementById(`${s}-${i+1}`).value = v);
        });
      }
    }

    function checkPassword() {
      const p = document.getElementById('passwordInput').value;
      if (p) {
        sessionStorage.setItem('newsmaker_password', p);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appShell').style.display = 'block';
        loadState(); initDate();
      }
    }

    function initDate() {
      const d = new Date(); d.setDate(d.getDate() + 1);
      const el = document.getElementById('dateInput');
      if (!el.value) el.value = d.toISOString().split('T')[0];
    }

    async function generate() {
      const password = sessionStorage.getItem('newsmaker_password');
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('statusLabel');
      
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Gerando...';
      status.textContent = 'Processando com Gemini...';
      saveState();

      const payload = { date: document.getElementById('dateInput').value };
      let hasEmpty = false;
      sections.forEach(s => {
        payload[s] = [1,2,3].map(i => {
          const v = document.getElementById(`${s}-${i}`).value.trim();
          if (!v) hasEmpty = true; return v;
        });
      });

      if (hasEmpty) {
        showToast('Preencha todas as notícias.', 'error');
        btn.disabled = false; btn.innerHTML = 'Gerar Boletins';
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${password}` },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro na geração');

        window.lastGenerationData = data;
        document.getElementById('downloadBtn').style.display = 'inline-flex';
        document.getElementById('syncBtn').style.display = 'inline-flex';
        
        let out = '';
        const list = document.getElementById('fileList'); list.innerHTML = '';
        sections.forEach(s => {
          out += `\n=== ${s.toUpperCase()} ===\n`;
          data.notes[s].forEach((n, i) => {
            out += `\n[${i+1}] ${n.text}\n`;
            const li = document.createElement('li'); li.textContent = `${s.toUpperCase()} ${i+1} - ${n.word_count} pal.`;
            list.appendChild(li);
          });
        });
        document.getElementById('resultBox').value = out.trim();
        document.getElementById('generatedOutput').style.display = 'block';
        status.textContent = 'Sucesso!';
        showToast('Boletins gerados!', 'success');
      } catch (e) {
        showToast(e.message, 'error');
        status.textContent = 'Erro.';
      } finally {
        btn.disabled = false; btn.innerHTML = 'Gerar Boletins';
      }
    }

    async function dispatchToStudios() {
      if (!window.lastGenerationData) return;
      const btn = document.getElementById('syncBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sincronizando...';
      
      try {
        const res = await fetch(DISPATCH_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${sessionStorage.getItem('newsmaker_password')}` 
          },
          body: JSON.stringify({
            date: window.lastGenerationData.date,
            notes: window.lastGenerationData.notes
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Falha no sync');
        showToast(`Sincronizado: ${data.dispatched_cities.join(', ')}`, 'success');
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        btn.disabled = false; btn.innerHTML = 'Sincronizar KV';
      }
    }

    // --- RTF ENGINE ---
    function rtfEscape(t) {
      if (!t) return "";
      return t.replace(/\n/g, " ").split('').map(c => {
        const code = c.charCodeAt(0);
        if (c === '\\' || c === '{' || c === '}') return '\\' + c;
        return (code >= 32 && code <= 126) ? c : `\\u${code <= 32767 ? code : code - 65536}?`;
      }).join('');
    }

    function buildRTF(header, time, regional, national) {
      return [
        `{\\rtf1\\ansi\\ansicpg1252\\deff0{\\fonttbl{\\f0\\fswiss Arial;}{\\f1\\fswiss Tahoma;}}`,
        `\\paperw12240\\paperh15840\\margl1800\\margr1800\\margt1440\\margb1440\\deftab708`,
        `\\pard\\qc\\b\\f1\\fs44 ${rtfEscape(header)}\\par`,
        `\\pard\\qc\\sb100\\sa100\\b\\fs44 ${rtfEscape(time)}\\par`,
        `\\pard\\qj\\b0\\f0\\fs44 ${rtfEscape(regional)}\\par`,
        `\\pard\\qc\\fs44 ...\\par`,
        `\\pard\\qj\\fs44 ${rtfEscape(national)}\\par}`
      ].join('\n');
    }

    async function downloadAllRTFs() {
      const data = window.lastGenerationData;
      if (!data) return;
      const zip = new JSZip();
      const dateVal = document.getElementById('dateInput').value;
      const dateObj = new Date(dateVal + 'T12:00:00');
      const weekdays = ["DOMINGO", "SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];
      const dayMonth = `${String(dateObj.getDate()).padStart(2, '0')}.${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
      
      const header = `REDE POP FM - NACIONAL - ${weekdays[dateObj.getDay()]} ${dayMonth}`;
      const cities = { itapeva: 'ITAPEVA', itapetininga: 'ITAPETININGA' };

      for (const [k, name] of Object.entries(cities)) {
        if (!data.notes[k]) continue;
        const folder = zip.folder(name);
        data.time_pairs.forEach((pair, i) => {
          const reg = data.notes[k][i].text;
          const nat = data.notes.nacional[i].text;
          pair.forEach(time => {
            folder.file(`${time}.rtf`, buildRTF(header, time, reg, nat));
          });
        });
      }

      const content = await zip.generateAsync({type:"blob"});
      const a = document.createElement('a'); a.href = URL.createObjectURL(content);
      a.download = `BOLETINS_${dayMonth}.zip`; a.click();
    }

    function clearAll() {
      if (confirm('Limpar tudo?')) {
        sections.forEach(s => [1,2,3].forEach(i => document.getElementById(`${s}-${i}`).value = ''));
        document.getElementById('resultBox').value = '';
        document.getElementById('generatedOutput').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'none';
        document.getElementById('syncBtn').style.display = 'none';
        localStorage.removeItem('newsmaker_state');
      }
    }

    document.querySelectorAll('textarea').forEach(el => el.addEventListener('input', saveState));
    document.getElementById('dateInput').addEventListener('change', saveState);
  </script>
</body>
</html>
